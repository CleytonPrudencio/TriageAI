server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:triageai
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

app:
  jwt:
    secret: TriageAI-Super-Secret-Key-2026-Must-Be-At-Least-256-Bits-Long!!
    expiration-ms: 86400000
  ai-service:
    url: http://localhost:8000
