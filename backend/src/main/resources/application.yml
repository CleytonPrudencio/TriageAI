server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/triageai
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  jwt:
    secret: TriageAI-Super-Secret-Key-2026-Must-Be-At-Least-256-Bits-Long!!
    expiration-ms: 86400000
  ai-service:
    url: http://localhost:8000
